<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 3 | Sign Up Page</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <video class="background-video" autoplay muted loop playsinline aria-hidden="true">
    <source src="assets/video/hero-background.mp4" type="video/mp4">
  </video>
  <div class="page-overlay" aria-hidden="true"></div>

  <main class="page-shell">
    <section class="hero-stage">
      <section class="card form-card">
        <button class="panel-close" type="button" aria-label="Decorative close button">×</button>

        <div class="section-heading">
          <p class="eyebrow">Student Registration</p>
          <h2>Login</h2>
          <p class="panel-copy">Create your account inside the glass panel.</p>
        </div>

        <form id="signup-form" novalidate>
          <div class="form-grid">
            <label>
              <span>First Name</span>
              <input type="text" id="firstName" name="firstName" placeholder="Jane" required>
            </label>

            <label>
              <span>Last Name</span>
              <input type="text" id="lastName" name="lastName" placeholder="Doe" required>
            </label>

            <label class="full-width">
              <span>Email</span>
              <input type="email" id="email" name="email" placeholder="student@example.edu" required>
            </label>

            <label>
              <span>Zip Code</span>
              <input type="text" id="zip" name="zip" maxlength="5" inputmode="numeric" placeholder="93955" required>
              <small id="zip-message" class="helper-text"></small>
            </label>

            <label>
              <span>City</span>
              <input type="text" id="city" name="city" readonly>
            </label>

            <label>
              <span>Latitude</span>
              <input type="text" id="latitude" name="latitude" readonly>
            </label>

            <label>
              <span>Longitude</span>
              <input type="text" id="longitude" name="longitude" readonly>
            </label>

            <label>
              <span>State</span>
              <select id="state" name="state" required>
                <option value="">Loading states...</option>
              </select>
            </label>

            <label>
              <span>County</span>
              <select id="county" name="county" required>
                <option value="">Select a state first</option>
              </select>
            </label>

            <label class="full-width">
              <span>Desired Username</span>
              <input type="text" id="username" name="username" placeholder="jdoe2026" required>
              <small id="username-message" class="helper-text"></small>
            </label>

            <label>
              <span>Password</span>
              <input type="password" id="password" name="password" minlength="6" required>
              <small id="password-suggestion" class="helper-text"></small>
            </label>

            <label>
              <span>Retype Password</span>
              <input type="password" id="passwordConfirm" name="passwordConfirm" minlength="6" required>
              <small id="password-message" class="helper-text"></small>
            </label>
          </div>

          <div id="form-message" class="form-message" aria-live="polite"></div>

          <button type="submit" class="submit-btn">Login</button>
        </form>

        <p class="register-note">Need another try? Submit to continue to the welcome page.</p>
      </section>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
