<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Cyber threat illustration</title>
  <desc id="desc">A dark server screen with warning symbols, bug icon and phishing hook.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <circle cx="400" cy="250" r="220" fill="url(#glow)"/>

  <rect x="150" y="110" width="500" height="300" rx="18" fill="#111827" stroke="#334155" stroke-width="4"/>
  <rect x="180" y="145" width="440" height="40" rx="8" fill="#1f2937"/>
  <rect x="180" y="205" width="280" height="26" rx="6" fill="#374151"/>
  <rect x="180" y="245" width="360" height="26" rx="6" fill="#374151"/>
  <rect x="180" y="285" width="320" height="26" rx="6" fill="#374151"/>

  <polygon points="585,220 615,280 555,280" fill="#f59e0b" stroke="#fbbf24" stroke-width="4"/>
  <circle cx="585" cy="300" r="10" fill="#f59e0b"/>

  <g fill="#22c55e" stroke="#16a34a" stroke-width="4">
    <ellipse cx="300" cy="330" rx="42" ry="26"/>
    <circle cx="278" cy="325" r="7" fill="#052e16" stroke="none"/>
    <circle cx="322" cy="325" r="7" fill="#052e16" stroke="none"/>
    <line x1="300" y1="305" x2="300" y2="280"/>
    <line x1="276" y1="307" x2="258" y2="290"/>
    <line x1="324" y1="307" x2="342" y2="290"/>
    <line x1="264" y1="338" x2="246" y2="354"/>
    <line x1="336" y1="338" x2="354" y2="354"/>
  </g>

  <path d="M520 90 C560 110, 560 160, 520 190" fill="none" stroke="#60a5fa" stroke-width="10" stroke-linecap="round"/>
  <path d="M520 190 C500 210, 490 235, 500 260" fill="none" stroke="#93c5fd" stroke-width="10" stroke-linecap="round"/>
  <circle cx="500" cy="272" r="18" fill="#60a5fa"/>
</svg>
